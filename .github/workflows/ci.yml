name: CI

# Quoted "on" deliberately, not bare `on:` -- YAML 1.1's boolean-keyword
# coercion (bare on/off/yes/no parse as booleans) makes an unquoted `on:` key
# ambiguous under a strict YAML 1.1 parser (confirmed locally: PyYAML's
# safe_load reads it as the Python boolean True, not the string "on").
# GitHub's own Actions parser tolerates the bare form in practice -- countless
# real workflows use it -- but quoting is unambiguous under any YAML parser
# and costs nothing, so there's no reason to rely on that tolerance rather
# than just sidestepping the ambiguity outright.
"on":
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # Proves research.md §B1's hermeticity claim rather than just asserting it
  # in a comment: Lw-Eh's own CMake files must never fetch or resolve an
  # external dependency (no FetchContent, no ExternalProject_Add, no
  # find_package/find_program/find_library). This is the exact grep gate
  # research.md §B1 names as the concrete way to prove this, not just claim
  # it -- "A cheap lint/CI grep gate... failing the build on any match
  # (belt-and-suspenders against future contributions)." Pattern requires the
  # keyword to be immediately followed by "(" (real invocation syntax), not
  # a bare word match -- a naive word-boundary grep would false-positive on
  # this repo's own root CMakeLists.txt, which explicitly documents these
  # are never used in a plain-English comment containing all five words.
  # Scope deliberately excludes packaging_check/ (added firing 31): that
  # directory's find_package(LwEh) is a DOWNSTREAM CONSUMER resolving Lw-Eh
  # itself as a dependency -- the exact legitimate use case §B1's packaging
  # promise exists to support -- not Lw-Eh's own build resolving something
  # for itself. Not an oversight; the two are conceptually opposite.
  hermeticity-lint:
    name: Hermeticity lint (no fetched/resolved dependencies)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Grep for forbidden dependency-fetching/resolving CMake commands
        run: |
          set -e
          PATTERN='(FetchContent_Declare|FetchContent_MakeAvailable|ExternalProject_Add|find_package|find_program|find_library)[[:space:]]*\('
          if grep -RnE "$PATTERN" --include='CMakeLists.txt' --include='*.cmake' \
              CMakeLists.txt cmake/ examples/ integrations/ size_audit/ tests/; then
            echo "::error::Found a forbidden dependency-fetching/resolving CMake command (research.md §B1: Lw-Eh's own build must never fetch or resolve an external dependency)."
            exit 1
          fi
          echo "Clean: no FetchContent/ExternalProject_Add/find_package/find_program/find_library invocations found."

  # Host correctness suite (research.md §B9/§A9's actual behavioral
  # contracts, not size) under host-debug, host-asan (firing 21), and
  # host-gcc (firing 29) -- keeps all three permanently exercised on every
  # push/PR, not just when a firing happens to remember to run them locally.
  # host-gcc matters specifically because it CAN'T be verified locally on
  # this project's own dev machine at all: that machine's "g++" is actually
  # an llvm-mingw Clang alias (confirmed via `g++ --version` printing "clang
  # version..."), not real GNU GCC, so CI is the only place the GNU-specific
  # branches in cmake/LwEhAggressiveFlags.cmake (-Os vs -Oz, -flto-
  # partition=none, --relax scoped to GNU only) have ever actually been
  # compiled with a genuine GNU compiler -- research.md §B7 frames GCC, not
  # Clang, as the real production toolchain family for the actual embedded
  # target (xtensa-esp32-elf-gcc), making this a real correctness gap, not
  # just belt-and-suspenders.
  # Deliberately does NOT attempt the Xtensa/RISC-V/ARM/AVR cross-compile
  # presets here: those need real embedded cross-toolchains this repo has
  # never fetched (and, per the zero-dependency rule this very lint job
  # enforces, never will via Lw-Eh's own CMake) -- installing one inside CI
  # is a distinct, larger decision, deliberately out of scope for this
  # workflow (see Research/PROGRESS.md).
  host-tests:
    name: Host tests (${{ matrix.preset }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        preset: [host-debug, host-asan, host-gcc]
    steps:
      - uses: actions/checkout@v7
      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y ninja-build clang gcc g++
      - name: Toolchain versions
        run: cmake --version && ninja --version && clang++ --version && g++ --version
      - name: Configure
        run: cmake --preset ${{ matrix.preset }}
      - name: Build
        run: cmake --build --preset ${{ matrix.preset }}
      - name: Test
        run: ctest --preset ${{ matrix.preset }} --output-on-failure

  # Proves research.md §B1's other documented consumption path -- plain
  # install()/find_package(LwEh) -- actually works, not just tests/,
  # examples/, and size_audit/'s add_subdirectory path (which never touches
  # install()/EXPORT/configure_package_config_file()/write_basic_package_
  # version_file() at all). Until firing 31, this whole packaging surface
  # had shipped, been documented, and never once been exercised end-to-end
  # by anything -- a regression here (a typo in the EXPORT name, a wrong
  # INSTALL_DESTINATION, a missing FILE_SET) would have been invisible to
  # every other check in this repo, since none of them build through this
  # path. packaging_check/ is a standalone project deliberately NOT
  # add_subdirectory'd from the root (find_package(LwEh) against a package
  # that's still mid-configure is structurally circular) -- see its own
  # CMakeLists.txt comment for the full reasoning and how to run this by
  # hand.
  packaging-check:
    name: Install + find_package(LwEh) consumption
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y ninja-build clang
      - name: Configure the library (install-only, no tests/examples/size_audit)
        run: cmake -S . -B build-install -G Ninja -DLWEH_BUILD_TESTS=OFF -DLWEH_BUILD_EXAMPLES=OFF -DLWEH_BUILD_SIZE_AUDIT=OFF -DCMAKE_CXX_COMPILER=clang++
      - name: Install to a scratch prefix
        run: cmake --install build-install --prefix ${{ runner.temp }}/lweh-prefix
      - name: Configure the standalone consumer via find_package(LwEh)
        run: cmake -S packaging_check -B build-consumer -G Ninja -DCMAKE_PREFIX_PATH=${{ runner.temp }}/lweh-prefix -DCMAKE_CXX_COMPILER=clang++
      - name: Build the consumer
        run: cmake --build build-consumer
      - name: Run the consumer (confirms real dispatch correctness through this path, not just linking)
        run: ./build-consumer/consumer
